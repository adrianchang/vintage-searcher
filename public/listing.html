<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Detail — Vintage Searcher</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/i18n.js"></script>
  <style>
    .images-scroll { scroll-snap-type: x mandatory; }
    .images-scroll img { scroll-snap-align: start; }
    .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
  </style>
</head>
<body class="bg-base-300 min-h-screen">
  <div class="max-w-2xl mx-auto px-5 py-8">
    <div class="flex items-center justify-between mb-6">
      <a href="/" class="btn btn-ghost btn-sm" data-i18n="detail.back">← Back</a>
      <div class="dropdown dropdown-end">
        <label tabindex="0" class="btn btn-ghost btn-sm lang-label">EN</label>
        <ul tabindex="0" class="dropdown-content menu p-2 shadow bg-base-100 rounded-box w-32 z-50">
          <li><a onclick="i18n.setLanguage('en')">English</a></li>
          <li><a onclick="i18n.setLanguage('zh')">中文</a></li>
        </ul>
      </div>
    </div>
    <div id="content"><div class="text-center py-10 text-base-content/50" data-i18n="detail.loading">Loading...</div></div>
  </div>

  <script>
    const listingId = new URLSearchParams(window.location.search).get('id');
    if (!listingId) { window.location.href = '/'; }

    let currentListing = null;

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function init() {
      const res = await fetch('/users/me/listings/' + listingId);
      if (!res.ok) { document.getElementById('content').innerHTML = '<div class="text-center py-10 text-base-content/50">' + i18n.t('detail.notFound') + '</div>'; return; }
      currentListing = await res.json();
      renderListing(currentListing);
      loadMessages();
    }

    function renderListing(l) {
      const images = JSON.parse(l.imageUrls);
      const ev = l.evaluation;
      const fallback = "this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23333%22 width=%221%22 height=%221%22/></svg>'";

      let html = '<div class="images-scroll flex gap-3 overflow-x-auto mb-6 pb-1">';
      if (images.length) {
        html += images.map(url => '<img src="' + esc(url) + '" class="h-64 rounded-2xl object-cover flex-shrink-0 bg-base-100/20 shadow-lg" onerror="' + fallback + '">').join('');
      }
      html += '</div>';

      html += '<div class="glass-card rounded-2xl p-5 mb-5">';
      html += '<h2 class="text-xl font-bold mb-2">' + esc(l.title) + '</h2>';
      html += '<p class="text-sm text-base-content/60"><span class="font-bold text-primary text-lg">$' + l.price.toFixed(2) + '</span> · ' + esc(l.platform) + '</p>';
      if (l.description) html += '<p class="text-sm text-base-content/50 mt-3 whitespace-pre-wrap leading-relaxed">' + esc(l.description) + '</p>';
      html += '<a class="link link-primary text-sm mt-3 inline-block" href="' + esc(l.url) + '" target="_blank" rel="noopener">' + i18n.t('detail.viewOriginal') + '</a>';
      html += '</div>';

      if (ev) {
        html += '<div class="glass-card rounded-2xl p-5 mb-5">';
        html += '<h2 class="text-lg font-bold mb-4">' + i18n.t('detail.evaluation') + ' ';
        if (ev.isOpportunity) html += '<span class="badge badge-success">' + i18n.t('detail.opportunity') + '</span> ';
        if (ev.isAuthentic) html += '<span class="badge badge-info">' + i18n.t('detail.authentic') + '</span>';
        html += '</h2>';
        if (ev.itemIdentification) {
          html += '<p class="text-sm text-base-content/70 mb-4">' + esc(ev.itemIdentification);
          if (ev.identificationConfidence != null) html += ' <span class="text-xs text-base-content/40">(' + i18n.t('detail.confidencePercent', { value: (ev.identificationConfidence * 100).toFixed(0) }) + ')</span>';
          html += '</p>';
        }
        html += '<div class="grid grid-cols-2 gap-x-6 gap-y-3 text-sm">';
        html += '<span class="text-base-content/40 uppercase text-xs tracking-wider">' + i18n.t('detail.era') + '</span><span class="font-semibold">' + esc(ev.estimatedEra || i18n.t('detail.unknown')) + '</span>';
        html += '<span class="text-base-content/40 uppercase text-xs tracking-wider">' + i18n.t('detail.estimatedValue') + '</span><span class="font-semibold">' + (ev.estimatedValue != null ? '$' + ev.estimatedValue.toFixed(2) : i18n.t('detail.unknown')) + '</span>';
        html += '<span class="text-base-content/40 uppercase text-xs tracking-wider">' + i18n.t('detail.currentPrice') + '</span><span class="font-semibold">$' + ev.currentPrice.toFixed(2) + '</span>';
        html += '<span class="text-base-content/40 uppercase text-xs tracking-wider">' + i18n.t('detail.margin') + '</span><span class="font-semibold">' + (ev.margin != null ? '$' + ev.margin.toFixed(2) : i18n.t('detail.na')) + '</span>';
        html += '<span class="text-base-content/40 uppercase text-xs tracking-wider">' + i18n.t('detail.confidence') + '</span><span class="font-semibold">' + (ev.confidence * 100).toFixed(0) + '%</span>';
        html += '</div>';
        html += '<p class="text-sm text-base-content/50 leading-relaxed mt-4 pt-4 border-t border-base-content/10">' + esc(ev.reasoning) + '</p>';

        const flags = JSON.parse(ev.redFlags);
        if (flags.length) {
          html += '<div class="mt-4"><p class="text-xs font-semibold uppercase tracking-wider text-error mb-1">' + i18n.t('detail.redFlags') + '</p><ul class="list-disc list-inside text-sm text-error/80">';
          flags.forEach(f => html += '<li>' + esc(f) + '</li>');
          html += '</ul></div>';
        }

        const comps = typeof ev.soldListings === 'string' ? JSON.parse(ev.soldListings) : (ev.soldListings || []);
        if (comps.length) {
          html += '<div class="mt-4"><p class="text-xs font-semibold uppercase tracking-wider text-base-content/40 mb-2">' + i18n.t('detail.comparableSales') + '</p>';
          html += '<div class="space-y-1">';
          comps.forEach(c => {
            html += '<div class="flex justify-between text-sm">';
            html += c.url ? '<a href="' + esc(c.url) + '" target="_blank" rel="noopener" class="link text-base-content/70 hover:text-primary">' + esc(c.title) + '</a>' : '<span class="text-base-content/70">' + esc(c.title) + '</span>';
            html += '<span class="font-semibold text-success shrink-0 ml-2">' + (c.price != null ? '$' + c.price.toFixed(2) : i18n.t('detail.na')) + '</span>';
            html += '</div>';
          });
          html += '</div></div>';
        }

        const refs = typeof ev.references === 'string' ? JSON.parse(ev.references) : (ev.references || []);
        if (refs.length) {
          html += '<div class="mt-4"><p class="text-xs font-semibold uppercase tracking-wider text-base-content/40 mb-1">' + i18n.t('detail.references') + '</p><ul class="list-disc list-inside text-sm text-primary/70 break-all">';
          refs.forEach(r => {
            if (r.startsWith('http')) {
              html += '<li><a href="' + esc(r) + '" target="_blank" rel="noopener" class="link hover:text-primary">' + esc(r) + '</a></li>';
            } else {
              html += '<li>' + esc(r) + '</li>';
            }
          });
          html += '</ul></div>';
        }

        html += '</div>';
      }

      html += '<div class="glass-card rounded-2xl p-5">';
      html += '<h2 class="text-lg font-bold mb-4">' + i18n.t('detail.chat') + '</h2>';
      html += '<div class="max-h-96 overflow-y-auto flex flex-col gap-2 mb-4" id="chatMessages"><p class="text-center text-base-content/30 text-sm py-8">' + i18n.t('detail.chatEmpty') + '</p></div>';
      html += '<div class="join w-full shadow-lg">';
      html += '<input type="text" id="chatInput" placeholder="' + esc(i18n.t('detail.chatPlaceholder')) + '" maxlength="1000" class="input input-bordered join-item flex-1 bg-base-100/50" onkeydown="if(event.key===\'Enter\')sendMessage()">';
      html += '<button id="sendBtn" class="btn btn-primary join-item" onclick="sendMessage()">' + i18n.t('detail.send') + '</button>';
      html += '</div></div>';

      document.getElementById('content').innerHTML = html;
    }

    async function loadMessages() {
      const res = await fetch('/users/me/listings/' + listingId + '/messages');
      if (!res.ok) return;
      const messages = await res.json();
      const container = document.getElementById('chatMessages');
      if (!messages.length) return;
      container.innerHTML = messages.map(m => {
        if (m.role === 'user') {
          return '<div class="chat chat-end"><div class="chat-bubble chat-bubble-primary">' + esc(m.content) + '</div></div>';
        } else {
          return '<div class="chat chat-start"><div class="chat-bubble">' + esc(m.content) + '</div></div>';
        }
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const btn = document.getElementById('sendBtn');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      btn.disabled = true;

      const container = document.getElementById('chatMessages');
      // Clear empty state
      const empty = container.querySelector('p');
      if (empty && empty.textContent.includes(i18n.t('detail.chatEmpty'))) empty.remove();

      // Optimistic user message
      container.innerHTML += '<div class="chat chat-end"><div class="chat-bubble chat-bubble-primary">' + esc(message) + '</div></div>';
      container.innerHTML += '<div class="chat chat-start" id="thinkingMsg"><div class="chat-bubble opacity-50 italic">' + i18n.t('detail.thinking') + '</div></div>';
      container.scrollTop = container.scrollHeight;

      try {
        const res = await fetch('/users/me/listings/' + listingId + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, lang: i18n.lang }),
        });
        const reply = await res.json();
        const thinking = document.getElementById('thinkingMsg');
        if (thinking) {
          thinking.innerHTML = '<div class="chat-bubble">' + esc(reply.content) + '</div>';
          thinking.id = '';
        }
      } catch (e) {
        const thinking = document.getElementById('thinkingMsg');
        if (thinking) {
          thinking.innerHTML = '<div class="chat-bubble chat-bubble-error">' + i18n.t('detail.chatError') + '</div>';
          thinking.id = '';
        }
      }

      btn.disabled = false;
      input.focus();
      container.scrollTop = container.scrollHeight;
    }

    window.addEventListener('languageChanged', () => {
      if (currentListing) renderListing(currentListing);
    });

    i18n.init().then(() => init());
  </script>
</body>
</html>
