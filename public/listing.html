<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listing Detail — Vintage Searcher</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .images-scroll { scroll-snap-type: x mandatory; }
    .images-scroll img { scroll-snap-align: start; }
  </style>
</head>
<body class="bg-base-200 min-h-screen">
  <div class="max-w-xl mx-auto p-5">
    <a href="/" class="btn btn-ghost btn-sm mb-4">← Back</a>
    <div id="content"><div class="text-center py-10 text-base-content/50">Loading...</div></div>
  </div>

  <script>
    const listingId = new URLSearchParams(window.location.search).get('id');
    if (!listingId) { window.location.href = '/'; }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function init() {
      const res = await fetch('/users/me/listings/' + listingId);
      if (!res.ok) { document.getElementById('content').innerHTML = '<div class="text-center py-10 text-base-content/50">Listing not found</div>'; return; }
      const listing = await res.json();
      renderListing(listing);
      loadMessages();
    }

    function renderListing(l) {
      const images = JSON.parse(l.imageUrls);
      const ev = l.evaluation;
      const fallback = "this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23ddd%22 width=%221%22 height=%221%22/></svg>'";

      let html = '<div class="images-scroll flex gap-2 overflow-x-auto mb-4">';
      if (images.length) {
        html += images.map(url => '<img src="' + esc(url) + '" class="h-60 rounded-lg object-cover flex-shrink-0 bg-base-300" onerror="' + fallback + '">').join('');
      }
      html += '</div>';

      html += '<div class="card bg-base-100 mb-4"><div class="card-body">';
      html += '<h2 class="card-title text-lg">' + esc(l.title) + '</h2>';
      html += '<p class="text-sm text-base-content/70"><span class="font-bold text-base-content">$' + l.price.toFixed(2) + '</span> · ' + esc(l.platform) + '</p>';
      if (l.description) html += '<p class="text-sm text-base-content/60 mt-2 whitespace-pre-wrap leading-relaxed">' + esc(l.description) + '</p>';
      html += '<a class="link link-primary text-sm mt-2" href="' + esc(l.url) + '" target="_blank" rel="noopener">View original listing</a>';
      html += '</div></div>';

      if (ev) {
        html += '<div class="card bg-base-100 mb-4"><div class="card-body">';
        html += '<h2 class="card-title text-base">Evaluation ';
        if (ev.isOpportunity) html += '<span class="badge badge-success">Opportunity</span> ';
        if (ev.isAuthentic) html += '<span class="badge badge-info">Authentic</span>';
        html += '</h2>';
        html += '<div class="grid grid-cols-2 gap-x-4 gap-y-2 text-sm">';
        html += '<span class="text-base-content/50">Era</span><span class="font-semibold">' + esc(ev.estimatedEra || 'Unknown') + '</span>';
        html += '<span class="text-base-content/50">Est. Value</span><span class="font-semibold">' + (ev.estimatedValue != null ? '$' + ev.estimatedValue.toFixed(2) : 'Unknown') + '</span>';
        html += '<span class="text-base-content/50">Current Price</span><span class="font-semibold">$' + ev.currentPrice.toFixed(2) + '</span>';
        html += '<span class="text-base-content/50">Margin</span><span class="font-semibold">' + (ev.margin != null ? '$' + ev.margin.toFixed(2) : 'N/A') + '</span>';
        html += '<span class="text-base-content/50">Confidence</span><span class="font-semibold">' + (ev.confidence * 100).toFixed(0) + '%</span>';
        html += '</div>';
        html += '<p class="text-sm text-base-content/60 leading-relaxed mt-3 pt-3 border-t border-base-200">' + esc(ev.reasoning) + '</p>';

        const flags = JSON.parse(ev.redFlags);
        if (flags.length) {
          html += '<div class="mt-3"><p class="text-sm font-semibold">Red Flags:</p><ul class="list-disc list-inside text-sm text-error">';
          flags.forEach(f => html += '<li>' + esc(f) + '</li>');
          html += '</ul></div>';
        }

        const refs = JSON.parse(ev.references);
        if (refs.length) {
          html += '<div class="mt-3"><p class="text-sm font-semibold">References:</p><ul class="list-disc list-inside text-sm text-primary break-all">';
          refs.forEach(r => html += '<li>' + esc(r) + '</li>');
          html += '</ul></div>';
        }

        html += '</div></div>';
      }

      html += '<div class="card bg-base-100"><div class="card-body">';
      html += '<h2 class="card-title text-base">Chat</h2>';
      html += '<div class="max-h-96 overflow-y-auto flex flex-col gap-2 mb-3" id="chatMessages"><p class="text-center text-base-content/40 text-sm py-5">Ask a question about this listing...</p></div>';
      html += '<div class="join w-full">';
      html += '<input type="text" id="chatInput" placeholder="Ask about this listing..." maxlength="1000" class="input input-bordered join-item flex-1" onkeydown="if(event.key===\'Enter\')sendMessage()">';
      html += '<button id="sendBtn" class="btn btn-neutral join-item" onclick="sendMessage()">Send</button>';
      html += '</div></div></div>';

      document.getElementById('content').innerHTML = html;
    }

    async function loadMessages() {
      const res = await fetch('/users/me/listings/' + listingId + '/messages');
      if (!res.ok) return;
      const messages = await res.json();
      const container = document.getElementById('chatMessages');
      if (!messages.length) return;
      container.innerHTML = messages.map(m => {
        if (m.role === 'user') {
          return '<div class="chat chat-end"><div class="chat-bubble chat-bubble-primary">' + esc(m.content) + '</div></div>';
        } else {
          return '<div class="chat chat-start"><div class="chat-bubble">' + esc(m.content) + '</div></div>';
        }
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const btn = document.getElementById('sendBtn');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      btn.disabled = true;

      const container = document.getElementById('chatMessages');
      // Clear empty state
      const empty = container.querySelector('p');
      if (empty && empty.textContent.includes('Ask a question')) empty.remove();

      // Optimistic user message
      container.innerHTML += '<div class="chat chat-end"><div class="chat-bubble chat-bubble-primary">' + esc(message) + '</div></div>';
      container.innerHTML += '<div class="chat chat-start" id="thinkingMsg"><div class="chat-bubble opacity-60 italic">Thinking...</div></div>';
      container.scrollTop = container.scrollHeight;

      try {
        const res = await fetch('/users/me/listings/' + listingId + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const reply = await res.json();
        const thinking = document.getElementById('thinkingMsg');
        if (thinking) {
          thinking.innerHTML = '<div class="chat-bubble">' + esc(reply.content) + '</div>';
          thinking.id = '';
        }
      } catch (e) {
        const thinking = document.getElementById('thinkingMsg');
        if (thinking) {
          thinking.innerHTML = '<div class="chat-bubble chat-bubble-error">Failed to get a response. Please try again.</div>';
          thinking.id = '';
        }
      }

      btn.disabled = false;
      input.focus();
      container.scrollTop = container.scrollHeight;
    }

    init();
  </script>
</body>
</html>
