<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vintage Searcher</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .listing-card-title { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
  </style>
</head>
<body class="bg-base-300 min-h-screen">
  <div class="max-w-2xl mx-auto px-5 py-8">
    <div class="flex items-center justify-between mb-8" id="authSection">
      <h1 class="text-3xl font-extrabold tracking-tight">Vintage Searcher</h1>
      <div class="flex items-center gap-3">
        <span id="authInfo" class="text-sm text-base-content/50"></span>
        <span id="authAction"></span>
      </div>
    </div>

    <div id="appContent" style="display:none">
      <div class="glass-card rounded-2xl p-5 mb-6">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-semibold uppercase tracking-wider text-base-content/50" id="quotaLabel">Used: 0 / 20</span>
        </div>
        <progress class="progress w-full h-2" id="quotaProgress" value="0" max="100"></progress>
      </div>

      <ul class="space-y-2 mb-5" id="queryList"></ul>

      <div class="text-error text-sm mb-2" id="error"></div>
      <div class="text-warning text-sm mb-2 text-center" id="unsaved"></div>

      <div class="join w-full mb-5 shadow-lg">
        <input type="text" id="newQuery" placeholder="Search query..." class="input input-bordered join-item flex-1 bg-base-100/50">
        <input type="number" id="newCount" value="5" min="1" max="20" class="input input-bordered join-item w-20 text-center bg-base-100/50">
        <button id="addBtn" class="btn btn-primary join-item" onclick="addQuery()">Add</button>
      </div>

      <div class="flex gap-3 mb-3">
        <button class="btn btn-primary flex-1 shadow-md" id="saveBtn" onclick="saveAll()" disabled>Save Changes</button>
        <button class="btn btn-neutral flex-1 shadow-md" id="scanBtn" onclick="runScan()">Run Scan</button>
      </div>
      <div class="text-success text-sm text-center mt-2" id="status"></div>

      <div class="mt-10" id="listingsSection" style="display:none">
        <h2 class="text-xl font-bold mb-5">Discovered Listings</h2>
        <div id="listingsContainer"></div>
      </div>
    </div>
  </div>

  <script>
    const QUOTA_LIMIT = 20;
    // Server state (last saved)
    let savedQueries = [];
    // Local working copy (edited in UI, not yet saved)
    let localQueries = [];

    async function checkAuth() {
      const res = await fetch('/auth/status');
      const data = await res.json();
      const infoEl = document.getElementById('authInfo');
      const actionEl = document.getElementById('authAction');

      if (data.authenticated) {
        infoEl.textContent = data.user.name;
        actionEl.innerHTML = '<button class="btn btn-ghost btn-xs" onclick="logout()">Log out</button>';
        document.getElementById('appContent').style.display = 'block';
        await loadQueries();
        await loadListings();
      } else {
        infoEl.textContent = '';
        actionEl.innerHTML = '<a href="/auth/google"><button class="btn btn-primary btn-xs">Sign in with Google</button></a>';
        document.getElementById('appContent').style.display = 'none';
      }
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.reload();
    }

    async function loadQueries() {
      savedQueries = await fetch('/users/me/queries').then(r => r.json());
      localQueries = savedQueries.map(q => ({ ...q }));
      render();
    }

    function getUsed() {
      return localQueries.filter(q => q.enabled).reduce((s, q) => s + q.count, 0);
    }

    function hasChanges() {
      if (localQueries.length !== savedQueries.length) return true;
      for (let i = 0; i < localQueries.length; i++) {
        const l = localQueries[i], s = savedQueries[i];
        if (l.query !== s.query || l.count !== s.count || l.enabled !== s.enabled) return true;
      }
      return false;
    }

    function render() {
      const used = getUsed();
      const pct = Math.min(100, (used / QUOTA_LIMIT) * 100);

      const prog = document.getElementById('quotaProgress');
      prog.value = pct;
      prog.className = 'progress w-full h-2';
      if (pct <= 50) prog.classList.add('progress-success');
      else if (pct <= 80) prog.classList.add('progress-warning');
      else prog.classList.add('progress-error');

      document.getElementById('quotaLabel').textContent = `Used: ${used} / ${QUOTA_LIMIT}`;

      const list = document.getElementById('queryList');
      list.innerHTML = localQueries.map((q, i) => `
        <li class="glass-card flex items-center gap-3 p-4 rounded-xl">
          <span class="flex-1 font-medium">${esc(q.query)}</span>
          <input type="number" value="${q.count}" min="1" max="20"
            class="input input-bordered input-sm w-16 text-center bg-base-100/50"
            onchange="localUpdateCount(${i}, this.value)">
          <button class="btn btn-error btn-sm btn-square btn-outline" onclick="localDelete(${i})">✕</button>
        </li>
      `).join('');

      const dirty = hasChanges();
      document.getElementById('saveBtn').disabled = !dirty;
      document.getElementById('unsaved').textContent = dirty ? 'You have unsaved changes' : '';

      const remaining = QUOTA_LIMIT - used;
      const noQuota = remaining <= 0;
      const countInput = document.getElementById('newCount');
      countInput.max = remaining;
      countInput.value = Math.min(parseInt(countInput.value) || 1, Math.max(remaining, 0));
      countInput.disabled = noQuota;
      document.getElementById('addBtn').disabled = noQuota;
      document.getElementById('newQuery').disabled = noQuota;
      document.getElementById('error').textContent = '';
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Local edits (no network calls) ---

    function localUpdateCount(index, val) {
      const count = parseInt(val);
      if (isNaN(count) || count < 1) { render(); return; }

      const q = localQueries[index];
      const otherUsed = getUsed() - (q.enabled ? q.count : 0);
      if (q.enabled && otherUsed + count > QUOTA_LIMIT) {
        document.getElementById('error').textContent = `Would exceed quota (max ${QUOTA_LIMIT - otherUsed} for this query)`;
        render();
        return;
      }

      q.count = count;
      render();
    }

    function localToggle(index) {
      const q = localQueries[index];
      if (!q.enabled) {
        // Enabling — check quota
        if (getUsed() + q.count > QUOTA_LIMIT) {
          document.getElementById('error').textContent = 'Would exceed quota';
          return;
        }
      }
      q.enabled = !q.enabled;
      render();
    }

    function localDelete(index) {
      localQueries.splice(index, 1);
      render();
    }

    function addQuery() {
      const queryInput = document.getElementById('newQuery');
      const countInput = document.getElementById('newCount');
      const query = queryInput.value.trim();
      const count = parseInt(countInput.value);

      if (!query) return;
      if (isNaN(count) || count < 1) return;

      localQueries.push({ query, count, enabled: true });
      queryInput.value = '';
      countInput.value = Math.min(5, QUOTA_LIMIT - getUsed());
      render();
    }

    // --- Save all changes to server ---

    async function saveAll() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      document.getElementById('error').textContent = '';

      const used = getUsed();
      if (used > QUOTA_LIMIT) {
        document.getElementById('error').textContent = `Total exceeds quota (${used} / ${QUOTA_LIMIT})`;
        btn.disabled = false;
        btn.textContent = 'Save Changes';
        return;
      }

      try {
        const res = await fetch('/users/me/queries', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            queries: localQueries.map(q => ({ query: q.query, count: q.count, enabled: q.enabled })),
          }),
        });

        if (!res.ok) throw new Error('Server error');

        savedQueries = await res.json();
        localQueries = savedQueries.map(q => ({ ...q }));
        render();
        document.getElementById('status').textContent = 'Changes saved';
        setTimeout(() => { document.getElementById('status').textContent = ''; }, 2000);
      } catch (err) {
        document.getElementById('error').textContent = 'Failed to save: ' + err.message;
      }

      btn.textContent = 'Save Changes';
    }

    async function runScan() {
      if (hasChanges()) {
        document.getElementById('error').textContent = 'Save your changes before scanning';
        return;
      }

      const btn = document.getElementById('scanBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = 'Scanning...';
      status.textContent = '';

      const res = await fetch('/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
      });

      const data = await res.json();
      btn.disabled = false;
      btn.textContent = 'Run Scan';
      status.textContent = data.message || 'Scan started';
    }

    function renderListingCard(l) {
      const images = JSON.parse(l.imageUrls);
      const imgSrc = images[0] || '';
      const ev = l.evaluation;
      let badges = '';
      if (ev) {
        const flags = JSON.parse(ev.redFlags);
        if (flags.length) badges += '<span class="badge badge-error">' + flags.length + ' flag' + (flags.length > 1 ? 's' : '') + '</span>';
      }
      return '<div class="glass-card rounded-2xl overflow-hidden cursor-pointer hover:shadow-xl hover:scale-[1.02] transition-all duration-200" onclick="window.location.href=\'/listing.html?id=' + l.id + '\'">' +
        '<figure><img src="' + esc(imgSrc) + '" class="w-full aspect-[3/4] object-cover bg-base-100/20" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23333%22 width=%221%22 height=%221%22/></svg>\'" alt=""></figure>' +
        '<div class="p-3 space-y-1.5">' +
        '<p class="listing-card-title text-sm font-semibold leading-tight">' + esc(l.title) + '</p>' +
        '<p class="font-bold"><span class="text-base-content/60">$' + l.price.toFixed(2) + '</span>' + (ev && ev.estimatedValue != null ? ' → <span class="text-success">$' + ev.estimatedValue.toFixed(2) + '</span>' : '') + '</p>' +
        (ev && ev.estimatedEra ? '<p class="text-xs text-base-content/50">' + esc(ev.estimatedEra) + '</p>' : '') +
        '<div class="flex flex-wrap gap-1.5">' + badges + '</div>' +
        '</div></div>';
    }

    function formatDayLabel(dateStr) {
      const date = new Date(dateStr);
      const today = new Date();
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (date.toDateString() === today.toDateString()) return 'Today';
      if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    async function loadListings() {
      try {
        const listings = await fetch('/users/me/listings').then(r => r.json());
        const section = document.getElementById('listingsSection');
        const container = document.getElementById('listingsContainer');
        if (!listings.length) { section.style.display = 'none'; return; }
        section.style.display = 'block';

        // Group by day
        const groups = {};
        listings.forEach(l => {
          const day = new Date(l.createdAt).toDateString();
          if (!groups[day]) groups[day] = [];
          groups[day].push(l);
        });

        // Sort days newest first
        const sortedDays = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));

        container.innerHTML = sortedDays.map(day => {
          const dayListings = groups[day];
          return '<div class="mb-8">' +
            '<h3 class="text-xs font-semibold uppercase tracking-wider text-base-content/40 mb-3">' + formatDayLabel(dayListings[0].createdAt) + '</h3>' +
            '<div class="grid grid-cols-2 sm:grid-cols-3 gap-4">' +
            dayListings.map(renderListingCard).join('') +
            '</div></div>';
        }).join('');
      } catch (e) {
        console.error('Failed to load listings:', e);
      }
    }

    checkAuth();
  </script>
</body>
</html>
